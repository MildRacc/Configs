# Background image
background_image /home/sashad/Pictures/Wallapapers/GoldenHourTerminal.png
background_image_layout scaled
background_opacity 0.85

# Use Hack Nerd Font
font_family Hack Nerd Font
bold_font auto
italic_font auto

# Add padding around text
window_padding_width 12

# Cursor settings
cursor_shape beam
cursor_color #FFCC00

# Selection (kitty doesn't support transparency in hex colors)
selection_foreground #1A1A2E
selection_background #FFFFFF

# Color scheme to complement Lofoten sunset
foreground #E8E8E8
background #1A1A2E

# Normal colors
color0  #2E3440
color1  #FF6B6B
color2  #95E1D3
color3  #FFD93D
color4  #6C94FF
color5  #D4A5FF
color6  #89DDFF
color7  #E8E8E8

# Bright colors
color8  #4C566A
color9  #FF8787
color10 #B0F5E5
color11 #FFE66D
color12 #89A8FF
color13 #E6BFFF
color14 #A3F0FF
color15 #FFFFFF

# Tab bar styling
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #1A1A2E
active_tab_background   #FFD93D
inactive_tab_foreground #E8E8E8
inactive_tab_background #3E4451
